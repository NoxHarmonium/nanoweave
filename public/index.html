<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nanoweave demo</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
  <style>
    body { background: #282c34; color: #abb2bf; }
    .nw-header { padding: 1.25rem 0 1rem; border-bottom: 1px solid #3e4451; margin-bottom: 1.25rem; }
    .nw-header h1 { font-size: 1.5rem; font-weight: 600; color: #e5c07b; margin: 0; }
    .nw-header p  { font-size: 0.875rem; color: #5c6370; margin: 0.25rem 0 0; }
    .editor-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
                    letter-spacing: 0.05em; color: #5c6370; margin-bottom: 0.35rem; }
    .editor-wrap  { border: 1px solid #3e4451; border-radius: 0.375rem; overflow: hidden;
                    height: 420px; overflow-y: auto; }
    .editor-wrap .cm-editor { height: 100%; }
    .editor-wrap .cm-scroller { overflow: auto; }
    select.form-select { background-color: #21252b; color: #abb2bf;
                         border-color: #3e4451; font-size: 0.875rem; }
    select.form-select:focus { border-color: #61afef; box-shadow: 0 0 0 0.2rem rgba(97,175,239,.25); }
  </style>
</head>
<body>
  <div class="container-fluid px-4">
    <div class="nw-header d-flex align-items-baseline gap-3">
      <h1>nanoweave</h1>
      <p>a data-transformation DSL</p>
    </div>

    <div class="row mb-3 align-items-center">
      <div class="col-auto">
        <label for="example-select" class="editor-label mb-0 me-2">Example</label>
      </div>
      <div class="col-sm-4 col-md-3">
        <select id="example-select" class="form-select form-select-sm"></select>
      </div>
    </div>

    <div class="row g-3">
      <div class="col-md-4">
        <div class="editor-label">Input JSON</div>
        <div id="editor-input" class="editor-wrap"></div>
      </div>
      <div class="col-md-4">
        <div class="editor-label">Transform</div>
        <div id="editor-transform" class="editor-wrap"></div>
      </div>
      <div class="col-md-4">
        <div class="editor-label">Output</div>
        <div id="editor-output" class="editor-wrap"></div>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
